name: Deploy MGL to Cloudflare Pages

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:

  parse-trigger:
    runs-on: ubuntu-latest
    outputs:
      run_deploy: ${{ steps.decide.outputs.run_deploy }}
    steps:
      - name: Decide whether to deploy
        id: decide
        run: |
          RUN=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RUN=true
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            MSG="${{ github.event.pull_request.title }}"
            echo "$MSG" | grep -qiE '\-\-cloudflare\b' && RUN=true || true
          else
            MSG="${{ github.event.head_commit.message }}"
            echo "$MSG" | grep -qiE '\-\-cloudflare\b' && RUN=true || true
          fi

          echo "run_deploy=$RUN" >> $GITHUB_OUTPUT
          echo "Run deploy: $RUN"

  deploy:
    runs-on: ubuntu-latest
    needs: parse-trigger
    if: needs.parse-trigger.outputs.run_deploy == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          echo "=== Cloudflare output ==="
          ls -la .svelte-kit/cloudflare/
          echo "=== Worker file ==="
          ls -lh .svelte-kit/cloudflare/_worker.js || echo "WARNING: _worker.js missing"

      - name: Create Pages project if needed
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages project create mgl \
            --production-branch=main 2>&1 || echo "Project exists, continuing"

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy .svelte-kit/cloudflare \
            --project-name=mgl \
            --branch=main \
            --commit-dirty=true

  summary:
    runs-on: ubuntu-latest
    needs: [parse-trigger, deploy]
    if: always()
    steps:
      - name: Print summary
        run: |
          echo "================================================="
          echo "  MGL — Deploy Summary"
          echo "================================================="
          echo "Build:   #${{ github.run_number }}"
          echo "Branch:  ${{ github.ref_name }}"
          echo "Trigger: ${{ github.event_name }}"
          echo "Deploy:  ${{ needs.deploy.result || 'skipped' }}"
          echo ""
          if [ "${{ needs.parse-trigger.outputs.run_deploy }}" != "true" ]; then
            echo "Skipped — commit message did not contain --cloudflare"
            echo "Add --cloudflare to your commit message to trigger a deploy."
          fi
